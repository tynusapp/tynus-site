<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Redefinir senha | Tynus</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f7f7f4; color: #20241f; }
    main { width: min(420px, calc(100% - 48px)); padding: 32px; border-radius: 20px; background: white; box-shadow: 0 12px 40px #00000012; text-align: center; }
    h1 { margin: 0 0 12px; font-size: 26px; }
    p { margin: 0 0 24px; line-height: 1.55; color: #596057; }
    a { display: block; padding: 14px 20px; border-radius: 12px; background: #315f4b; color: white; font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <h1>Redefinir sua senha</h1>
    <p>Abra o aplicativo Tynus para criar uma nova senha.</p>
    <a id="open-app" href="#">Abrir o Tynus</a>
  </main>
  <script>
    const token = new URLSearchParams(window.location.search).get('token') || '';
    const link = document.getElementById('open-app');
    link.href = `tynus://app/reset-password?token=${encodeURIComponent(token)}`;
  </script>
</body>
</html>
